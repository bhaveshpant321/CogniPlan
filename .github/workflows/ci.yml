name: CogniPlan CI/CD Checker
on: [push, pull_request]

jobs:
  role3-lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: role3-ux-experience
    steps:
      - uses: actions/checkout@v4
      - name: Lint Check (Role 3)
        run: npm ci
      - name: Run ESLint
        run: npm run lint

  role1-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: role1-systems-logic
    steps:
      - uses: actions/checkout@v4
      - name: Install Role 1 deps
        run: npm ci
      - name: Test Logic (Role 1)
        run: npm test
